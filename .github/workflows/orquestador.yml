name: Orquestador cada 4h - Producción

on:
  schedule:
    - cron: '0 */4 * * *'   # 6 corridas al día, en punto (UTC)
  workflow_dispatch:         # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: orquestador-produccion
  cancel-in-progress: false

jobs:
  ejecutar-orquestador:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r produccion/01_modelo_produccion/requirements.txt

      - name: Correr orquestador
        run: |
          python produccion/01_modelo_produccion/00_orquestador.py

      - name: Commit y push de la BD actualizada
        if: always()   # persistir el diagnóstico (tabla corridas/logs_ejecucion) aunque el orquestador haya terminado en error
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add produccion/01_modelo_produccion/produccion_gran_concepcion.db
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git diff --staged --quiet || git commit -m "Actualización automática BD producción [skip ci] - $TIMESTAMP"
          git fetch origin main
          git merge -X ours --no-edit origin/main
          git push origin HEAD:main
